<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Signal arcs (WiFi / antenna style — telecom signal) -->
  <!-- Outer arc -->
  <path d="M5 22 Q5 7 16 7 Q27 7 27 22"
        fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Middle arc -->
  <path d="M9 22 Q9 12 16 12 Q23 12 23 22"
        fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner arc -->
  <path d="M13 22 Q13 16 16 16 Q19 16 19 22"
        fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Centre dot (signal source) -->
  <circle cx="16" cy="22" r="2.5" fill="white"/>

  <!-- Fault / alert badge (top-right) — red circle with exclamation -->
  <circle cx="25" cy="8"  r="5"   fill="#dc2626"/>
  <rect   x="24" y="5.5" width="2" height="3.5" rx="1" fill="white"/>
  <circle cx="25" cy="11" r="0.9" fill="white"/>
</svg>
